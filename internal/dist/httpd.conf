<IfModule !ssl_module>
<VirtualHost *:80>
	ServerName {{SITE_NAME}}
	Redirect Permanent / http://www.{{SITE_NAME}}/
</VirtualHost>
<VirtualHost *:80>
	ServerName www.{{SITE_NAME}}
	DocumentRoot {{PROJECT_ROOT}}/public
	ErrorLog ${APACHE_LOG_DIR}/www.{{SITE_NAME}}-error.log
	CustomLog ${APACHE_LOG_DIR}/www.{{SITE_NAME}}-access.log combined
</VirtualHost>
</IfModule>


<IfModule ssl_module>
<VirtualHost *:80>
	ServerName www.{{SITE_NAME}}
	ServerAlias www.{{SITE_NAME}} {{SITE_NAME}}
	Redirect Permanent / https://www.{{SITE_NAME}}/
</VirtualHost>
<VirtualHost *:443>
	ServerName {{SITE_NAME}}
	Redirect Permanent / https://www.{{SITE_NAME}}/

	SSLEngine on
	SSLOptions +StrictRequire

	# Prevent Beast attack
	SSLHonorCipherOrder on

	# SSL Compression (CRIME attack)
	SSLCompression off

	SSLProtocol             all -SSLv2 -SSLv3 -TLSv1
	SSLCipherSuite          ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-DSS-AES128-GCM-SHA256:kEDH+AESGCM:ECDHE-RSA-AES128-SHA256:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA:ECDHE-ECDSA-AES128-SHA:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA:ECDHE-ECDSA-AES256-SHA:DHE-RSA-AES128-SHA256:DHE-RSA-AES128-SHA:DHE-DSS-AES128-SHA256:DHE-RSA-AES256-SHA256:DHE-DSS-AES256-SHA:DHE-RSA-AES256-SHA:!aNULL:!eNULL:!EXPORT:!DES:!RC4:!3DES:!MD5:!PSK

	# Replace self-signed certificate with a real one!
	SSLCertificateFile		"{{PROJECT_ROOT}}/ssl/server.crt"
	SSLCertificateKeyFile	"{{PROJECT_ROOT}}/ssl/server.key"

</VirtualHost>
<VirtualHost *:443>
	ServerName www.{{SITE_NAME}}:443
	DocumentRoot {{PROJECT_ROOT}}/public
	ErrorLog ${APACHE_LOG_DIR}/www.{{SITE_NAME}}-error.log
	CustomLog ${APACHE_LOG_DIR}/www.{{SITE_NAME}}-access.log combined

	SSLEngine on
	SSLOptions +StrictRequire

	# Prevent Beast attack
	SSLHonorCipherOrder on

	# SSL Compression (CRIME attack)
	SSLCompression off

	SSLProtocol             all -SSLv2 -SSLv3 -TLSv1
	SSLCipherSuite          ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-DSS-AES128-GCM-SHA256:kEDH+AESGCM:ECDHE-RSA-AES128-SHA256:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA:ECDHE-ECDSA-AES128-SHA:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA:ECDHE-ECDSA-AES256-SHA:DHE-RSA-AES128-SHA256:DHE-RSA-AES128-SHA:DHE-DSS-AES128-SHA256:DHE-RSA-AES256-SHA256:DHE-DSS-AES256-SHA:DHE-RSA-AES256-SHA:!aNULL:!eNULL:!EXPORT:!DES:!RC4:!3DES:!MD5:!PSK

	# Replace self-signed certificate with a real one!
	SSLCertificateFile		"{{PROJECT_ROOT}}/ssl/server.crt"
	SSLCertificateKeyFile	"{{PROJECT_ROOT}}/ssl/server.key"

</VirtualHost>
</IfModule>
