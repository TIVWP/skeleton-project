<VirtualHost *:80>
	ServerName www.SKELETON.com
	ServerAlias www.SKELETON.com SKELETON.com
	Redirect Permanent / https://SKELETON.com/
</VirtualHost>
<VirtualHost *:443>
	ServerName www.SKELETON.com
	Redirect Permanent / https://SKELETON.com/
</VirtualHost>
<VirtualHost *:443>
	ServerName SKELETON.com:443
	DocumentRoot /var/www/u/SKELETON.com/public
	ErrorLog ${APACHE_LOG_DIR}/SKELETON.com-error.log
	CustomLog ${APACHE_LOG_DIR}/SKELETON.com-access.log combined
	SSLEngine on

	SSLProtocol             all -SSLv2 -SSLv3 -TLSv1
	SSLCipherSuite          ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-DSS-AES128-GCM-SHA256:kEDH+AESGCM:ECDHE-RSA-AES128-SHA256:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA:ECDHE-ECDSA-AES128-SHA:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA:ECDHE-ECDSA-AES256-SHA:DHE-RSA-AES128-SHA256:DHE-RSA-AES128-SHA:DHE-DSS-AES128-SHA256:DHE-RSA-AES256-SHA256:DHE-DSS-AES256-SHA:DHE-RSA-AES256-SHA:!aNULL:!eNULL:!EXPORT:!DES:!RC4:!3DES:!MD5:!PSK
	SSLHonorCipherOrder     on
	SSLCompression          off

	# WoSign
	SSLCertificateChainFile	"/var/www/u/SKELETON.com/ssl/1_root_bundle.crt"
	SSLCertificateFile		"/var/www/u/SKELETON.com/ssl/2_SKELETON.com.crt"
	SSLCertificateKeyFile	"/var/www/u/SKELETON.com/ssl/3_SKELETON.com.key"
</VirtualHost>
